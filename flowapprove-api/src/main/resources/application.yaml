spring:
  application:
    name: flowapprove-api
  datasource:
    url: ${FLOWAPPROVE_DB_URL:jdbc:postgresql://localhost:55432/flowapprove}
    driver-class-name: org.postgresql.Driver
    username: ${FLOWAPPROVE_DB_USERNAME:postgres}
    password: ${FLOWAPPROVE_DB_PASSWORD:postgres}
  flyway:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

flowapprove:
  redis:
    enabled: true
    host: ${FLOWAPPROVE_REDIS_HOST:localhost}
    port: ${FLOWAPPROVE_REDIS_PORT:56379}
    password: ${FLOWAPPROVE_REDIS_PASSWORD:}
    database: ${FLOWAPPROVE_REDIS_DATABASE:0}
    key-prefix: ${FLOWAPPROVE_REDIS_KEY_PREFIX:flowapprove}
    default-ttl: ${FLOWAPPROVE_REDIS_DEFAULT_TTL:10m}
    command-timeout: ${FLOWAPPROVE_REDIS_COMMAND_TIMEOUT:2s}
